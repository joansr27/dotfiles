# === SOFT MONOCHROME THEME ===

# Basic Colors
background              #1C1C1C
foreground              #D4D4D4
selection_background    #3A3A3A
selection_foreground    #F5F5F5
cursor                  #E8E8E8
cursor_text_color       #1C1C1C

# URL underline color when hovering with mouse
url_color               #A8A8A8

# The 16 Terminal Colors (Mapped to shades of gray)
# Black
color0  #2D2D2D
color8  #4A4A4A

# Red (Normally error/warn, mapped to dark mid-gray)
color1  #6B6B6B
color9  #7B7B7B

# Green (Normally strings/success, mapped to light mid-gray)
color2  #8E8E8E
color10 #9E9E9E

# Yellow
color3  #A1A1A1
color11 #B1B1B1

# Blue
color4  #5C5C5C
color12 #6C6C6C

# Magenta
color5  #747474
color13 #848484

# Cyan
color6  #868686
color14 #969696

# White
color7  #D4D4D4
color15 #F5F5F5


# === WINDOW STYLING ===
window_padding_width 14
#font_family SF Mono
#font_family JetBrainsMono Nerd Font Mono
bold_font auto
italic_font auto
bold_italic_font auto
font_size 14.0


# === ORIGINAL KITTY CONFIG ===
#
# Window and transparency
# background_opacity 0.80
# dynamic_background_opacity yes
#
# Colors (a dark, sleek tint)
# background #11111b
# foreground #cdd6f4
#
# Padding (leaves de glass some breathing room)
# window_padding_width 10
#
# Font
# font_size 15.0
